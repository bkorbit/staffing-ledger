name: Sync QuickBooks Time actuals

on:
  schedule:
    - cron: '0 7 * * *'   # daily at 07:00 UTC (~2–3am US Eastern)
  workflow_dispatch: {}    # adds a "Run workflow" button for manual syncs

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Pull QB Time hours into Supabase
        run: node scripts/sync-qbtime.mjs
        env:
          QBTIME_TOKEN: ${{ secrets.QBTIME_TOKEN }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
